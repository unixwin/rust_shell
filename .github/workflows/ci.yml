name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  rust:
    name: Rust tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Run cargo tests
        run: cargo test

  bash-upstream-progress:
    name: Bash upstream test progress
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Run GNU Bash upstream tests
        run: scripts/run-bash-upstream-tests.sh

      - name: Publish progress summary
        if: always()
        run: cat target/bash-upstream-tests/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload upstream test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bash-upstream-test-progress
          path: |
            target/bash-upstream-tests/summary.md
            target/bash-upstream-tests/results.tsv
            target/bash-upstream-tests/logs
